[build]
  publish = "."

[[redirects]]
  from = "/ptee"
  to = "/ptee.html"
  status = 200

[[redirects]]
  from = "/linea-roja"
  to = "/linea-roja.html"
  status = 200

[[redirects]]
  from = "/linearoja"
  to = "/linea-roja.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
